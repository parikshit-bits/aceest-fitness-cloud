name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Job 1: Build & Lint ─────────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 lint check
        run: flake8 app.py test_app.py --max-line-length=100

  # ── Job 2: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

      - name: Verify image exists
        run: docker image inspect aceest-fitness:${{ github.sha }}

  # ── Job 3: Automated Tests inside Docker ────────────────────────────────────
  test-in-container:
    name: Automated Testing (Pytest in Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: |
          docker run --rm aceest-fitness:test \
            python -m pytest test_app.py -v --tb=short

  # ── Job 4: Trigger Jenkins (only on merge to main) ───────────────────────────
  trigger-jenkins:
    name: Trigger Jenkins Build
    runs-on: ubuntu-latest
    needs: test-in-container
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Jenkins pipeline
        run: |
          HTTP_CODE=$(curl -s -o /tmp/jenkins_response.txt -w "%{http_code}" \
            -X POST \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
            -H "ngrok-skip-browser-warning: true" \
            "${{ secrets.JENKINS_URL }}/job/${{ secrets.JENKINS_JOB_NAME }}/build?token=${{ secrets.JENKINS_API_TOKEN }}")
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/jenkins_response.txt
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Jenkins triggered successfully!"
          else
            echo "❌ Jenkins trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Confirm trigger sent
        run: |
          echo "✅ Jenkins triggered successfully!"
          echo "Commit : ${{ github.sha }}"
          echo "By     : ${{ github.actor }}"
          echo "Branch : ${{ github.ref_name }}"